<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <!-- Supabase JS Client library CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Light/Dark high-contrast forced theme variables */
        :root {
            --bg-color: #0f172a !important;
            --card-bg: #1e293b !important;
            --text-main: #ffffff !important;
            --text-muted: #94a3b8 !important;
            --border-color: #475569 !important;
            --primary: #6366f1 !important;
            --success: #10b981 !important;
            --danger: #ef4444 !important;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
        }

        body { 
            background-color: #0f172a !important; 
            color: #ffffff !important; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* WARNING STATUS BANNER - VISIBLE IF NOT SET UP */
        .config-warning {
            background-color: #7f1d1d !important;
            border: 2px solid #ef4444 !important;
            color: #fca5a5 !important;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .card { 
            background-color: #1e293b !important; 
            border: 2px solid #334155 !important; 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 8px; 
            font-size: 1.6rem; 
            color: #ffffff !important;
            font-weight: 700;
        }

        p.subtitle { 
            color: #94a3b8 !important; 
            text-align: center; 
            margin-bottom: 24px; 
            font-size: 0.95rem; 
        }

        .form-group { 
            margin-bottom: 20px; 
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.9rem; 
            font-weight: 600; 
            color: #cbd5e1 !important; 
        }

        .form-control { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #475569 !important; 
            border-radius: 8px; 
            background-color: #0f172a !important; 
            color: #ffffff !important; 
            font-size: 1.1rem; 
        }

        .form-control::placeholder {
            color: #64748b !important;
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 1.1rem; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-top: 10px;
        }

        .btn-primary { 
            background-color: #4f46e5 !important; 
            color: #ffffff !important; 
        }
        
        .btn-success { 
            background-color: #10b981 !important; 
            color: #ffffff !important; 
        }

        .hidden { 
            display: none !important; 
        }

        #message { 
            text-align: center; 
            margin-top: 15px; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 6px; 
        }

        .welcome-badge { 
            background: #334155 !important; 
            padding: 14px; 
            border-radius: 8px; 
            text-align: center; 
            margin-bottom: 24px; 
            border: 1px solid #475569 !important;
            color: #ffffff !important;
            font-size: 1rem;
        }
        .welcome-badge strong { 
            color: #818cf8 !important; 
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Live Visual Verification Banner -->
        <div id="setupWarning" class="config-warning hidden">
            ⚠️ Warning: Supabase Credentials are not set up yet! Edit index.html to insert your database API keys.
        </div>

        <div class="card">
            <!-- PHASE 1: REGISTRATION SCREEN -->
            <div id="registerSection" class="hidden">
                <h2>👋 Registration</h2>
                <p class="subtitle">Enter your details. You will only do this once.</p>
                <form id="registerForm">
                    <div class="form-group">
                        <label>Student ID / Roll Number</label>
                        <input type="text" id="regId" class="form-control" placeholder="e.g. STU101" required>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Class / Course / Level</label>
                        <input type="text" id="regCourse" class="form-control" placeholder="e.g. Level 200" required>
                    </div>
                    <button type="submit" class="btn btn-primary">💾 Save Profile to Device</button>
                </form>
            </div>

            <!-- PHASE 2: ATTENDANCE CHECK-IN SCREEN -->
            <div id="checkInSection" class="hidden">
                <h2>📱 Attendance Portal</h2>
                <p class="subtitle" id="dateDisplay"></p>
                
                <div class="welcome-badge">
                    Logged in as: <strong id="studentInfoDisplay">...</strong>
                </div>

                <form id="checkInForm">
                    <div class="form-group">
                        <label>Class Passcode</label>
                        <input type="text" id="passcode" class="form-control" placeholder="Enter Code" maxlength="6" required style="font-size: 1.8rem; text-align: center; letter-spacing: 4px; font-weight: bold; text-transform: uppercase;">
                    </div>
                    <button type="submit" class="btn btn-success">✅ Verify & Check In</button>
                </form>
                <div id="message" class="hidden"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 🔴 REPLACE THESE WITH YOUR COPIED CONFIGS FROM SUPABASE ---
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

        let supabase = null;

        // Check if configuration placeholders have been customized
        if (SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY") {
            supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            document.getElementById('setupWarning').classList.remove('hidden');
        }

        let cachedStudent = JSON.parse(localStorage.getItem('my_attendance_profile'));

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenFromUrl = urlParams.get('token');
            if (tokenFromUrl) {
                document.getElementById('passcode').value = tokenFromUrl;
            }

            document.getElementById('dateDisplay').innerText = `Today's Date: ${new Date().toISOString().split('T')}`;
            routeUserView();
        });

        function routeUserView() {
            if (!cachedStudent) {
                document.getElementById('registerSection').classList.remove('hidden');
                document.getElementById('checkInSection').classList.add('hidden');
            } else {
                document.getElementById('registerSection').classList.add('hidden');
                document.getElementById('checkInSection').classList.remove('hidden');
                document.getElementById('studentInfoDisplay').innerText = `${cachedStudent.name} (${cachedStudent.id})`;
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('regId').value.trim().toUpperCase();
            const name = document.getElementById('regName').value.trim();
            const course = document.getElementById('regCourse').value.trim();

            if (!supabase) {
                alert("Cannot connect to Database. Please enter real Supabase credentials first!");
                return;
            }

            const { error } = await supabase
                .from('students')
                .upsert({ id, name, course }, { onConflict: 'id' });

            if (error) {
                alert("Database Error: " + error.message);
                return;
            }

            cachedStudent = { id, name, course };
            localStorage.setItem('my_attendance_profile', JSON.stringify(cachedStudent));
            routeUserView();
        });

        document.getElementById('checkInForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userCode = document.getElementById('passcode').value.trim().toUpperCase();
            const today = new Date().toISOString().split('T');
            const msgDiv = document.getElementById('message');

            msgDiv.className = "";
            msgDiv.classList.remove('hidden');
            msgDiv.style.color = "white";
            msgDiv.innerText = "Checking validation token...";

            if (!supabase) {
                msgDiv.innerText = "❌ Connection failed. Supabase is not configured.";
                msgDiv.style.backgroundColor = "#ef4444";
                return;
            }

            const { data: tokenData, error: tokenError } = await supabase
                .from('security_tokens')
                .select('token')
                .eq('id', 'active_session')
                .single();

            if (tokenError || !tokenData) {
                msgDiv.innerText = "❌ Connection failed. Try again.";
                msgDiv.style.backgroundColor = "#ef4444";
                return;
            }

            if (userCode !== tokenData.token) {
                msgDiv.innerText = "❌ Code Expired or Invalid!";
                msgDiv.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
                msgDiv.style.color = "#ef4444";
                return;
            }

            const { error: logError } = await supabase
                .from('attendance_logs')
                .insert({ student_id: cachedStudent.id, date: today, status: 'Present' });

            if (logError) {
                if (logError.code === "23505") { 
                    msgDiv.innerText = "ℹ️ Already marked present for today!";
                    msgDiv.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                    msgDiv.style.color = "#10b981";
                } else {
                    msgDiv.innerText = "❌ Error: " + logError.message;
                    msgDiv.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
                }
                return;
            }

            msgDiv.innerText = "🚀 Attendance Recorded!";
            msgDiv.style.backgroundColor = "rgba(16, 185, 129, 0.2)";
            msgDiv.style.color = "#10b981";
            document.getElementById('passcode').value = "";
        });
    </script>
</body>
</html>
