<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); width: 100%; max-width: 420px; }
        h2 { text-align: center; margin-bottom: 8px; font-size: 1.5rem; }
        p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 24px; font-size: 0.9rem; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-color); color: var(--text-main); font-size: 1rem; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .hidden { display: none !important; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 6px; }
        .welcome-badge { background: #334155; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .welcome-badge strong { color: var(--primary); }
    </style>
</head>
<body>

    <div class="card">
        <div id="registerSection" class="hidden">
            <h2>👋 First-Time Registration</h2>
            <p class="subtitle">Enter your real details. You will only do this once.</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>Student ID / Roll Number</label>
                    <input type="text" id="regId" class="form-control" placeholder="e.g. STU101" required>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Class / Course / Level</label>
                    <input type="text" id="regCourse" class="form-control" placeholder="e.g. BSc Computer Science Level 200" required>
                </div>
                <button type="submit" class="btn btn-primary">💾 Save Profile to Device</button>
            </form>
        </div>

        <div id="checkInSection" class="hidden">
            <h2>📱 Attendance Check-In</h2>
            <p class="subtitle" id="dateDisplay"></p>
            
            <div class="welcome-badge">
                Logged in as: <strong id="studentInfoDisplay">...</strong>
            </div>

            <form id="checkInForm">
                <div class="form-group">
                    <label>Class Passcode</label>
                    <input type="text" id="passcode" class="form-control" placeholder="Enter 4-Digit Code" maxlength="6" required style="font-size: 1.8rem; text-align: center; letter-spacing: 6px; font-weight: bold; text-transform: uppercase;">
                    <small style="color: var(--text-muted); display: block; text-align: center; margin-top: 8px;">Look at the projector screen, chalkboard, or ask the Lecturer.</small>
                </div>
                <button type="submit" class="btn btn-success">✅ Verify & Mark Me Present</button>
            </form>
            <div id="message" class="hidden"></div>
        </div>
    </div>

    <script>
        // --- 🔴 IMPORTANT: CONFIGURATION ---
        // Replace these strings with your actual Supabase URL and Anon Key
        const SUPABASE_URL = "https://ntxuezuxnbbrtoenimyk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50eHVlenV4bmJicnRvZW5pbXlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTEyMzIsImV4cCI6MjA5NTM4NzIzMn0.3unzuoVz0Mk6Ocy6cd66O5yefMwbz8KcT-kPxS3SCZA";
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // App States
        let cachedStudent = JSON.parse(localStorage.getItem('my_attendance_profile'));

        window.addEventListener('DOMContentLoaded', () => {
            // Check if URL contains an auto-scanned token parameter from QR code
            const urlParams = new URLSearchParams(window.location.search);
            const tokenFromUrl = urlParams.get('token');
            if (tokenFromUrl) {
                document.getElementById('passcode').value = tokenFromUrl;
            }

            document.getElementById('dateDisplay').innerText = `Today's Date: ${new Date().toISOString().split('T')}`;
            routeUserView();
        });

        function routeUserView() {
            if (!cachedStudent) {
                document.getElementById('registerSection').classList.remove('hidden');
                document.getElementById('checkInSection').classList.add('hidden');
            } else {
                document.getElementById('registerSection').classList.add('hidden');
                document.getElementById('checkInSection').classList.remove('hidden');
                document.getElementById('studentInfoDisplay').innerText = `${cachedStudent.name} (${cachedStudent.id})`;
            }
        }

        // Handle Registration
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('regId').value.trim().toUpperCase();
            const name = document.getElementById('regName').value.trim();
            const course = document.getElementById('regCourse').value.trim();

            // Save to central cloud database
            const { error } = await supabase
                .from('students')
                .upsert({ id, name, course }, { onConflict: 'id' });

            if (error) {
                alert("Database Error: " + error.message);
                return;
            }

            // Save to local browser cache memory permanently
            cachedStudent = { id, name, course };
            localStorage.setItem('my_attendance_profile', JSON.stringify(cachedStudent));
            routeUserView();
        });

        // Handle Check-In Submission
        document.getElementById('checkInForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userCode = document.getElementById('passcode').value.trim().toUpperCase();
            const today = new Date().toISOString().split('T');
            const msgDiv = document.getElementById('message');

            msgDiv.className = "";
            msgDiv.classList.remove('hidden');
            msgDiv.style.color = "white";
            msgDiv.innerText = "Checking validation token...";

            // 1. Fetch active token from server
            const { data: tokenData, error: tokenError } = await supabase
                .from('security_tokens')
                .select('token')
                .eq('id', 'active_session')
                .single();

            if (tokenError || !tokenData) {
                msgDiv.innerText = "❌ Connection failed. Refresh and try again.";
                msgDiv.style.backgroundColor = var(--danger);
                return;
            }

            // 2. ANTI-CHEAT VERIFICATION STEP
            if (userCode !== tokenData.token) {
                msgDiv.innerText = "❌ Code Expired or Invalid! Look up at the board for the new one.";
                msgDiv.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
                msgDiv.style.color = var(--danger);
                return;
            }

            // 3. Mark attendance live into the system
            const { error: logError } = await supabase
                .from('attendance_logs')
                .insert({ student_id: cachedStudent.id, date: today, status: 'Present' });

            if (logError) {
                if (logError.code === "23505") { // Unique constraint error code
                    msgDiv.innerText = "ℹ️ You have already been marked present for today!";
                    msgDiv.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                    msgDiv.style.color = var(--success);
                } else {
                    msgDiv.innerText = "❌ Error: " + logError.message;
                    msgDiv.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
                }
                return;
            }

            msgDiv.innerText = "🚀 Attendance Successfully Recorded!";
            msgDiv.style.backgroundColor = "rgba(16, 185, 129, 0.2)";
            msgDiv.style.color = var(--success);
            document.getElementById('passcode').value = "";
        });
    </script>
</body>
</html>
