<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RollCallX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0f19;
  --card: rgba(255,255,255,0.05);
  --accent: #7c3aed;
  --accent2: #ff3366;
  --text: #fff;
  --sub: #9ca3af;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.glass {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

h1 {
  text-align: center;
  margin-top: 20px;
}

.subtitle {
  text-align: center;
  color: var(--sub);
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 18px;
  border-radius: 14px;
  border: none;
  margin-top: 15px;
  background: rgba(255,255,255,0.08);
  color: white;
  text-align: center;
  font-size: 18px;
  letter-spacing: 4px;
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  background: linear-gradient(135deg, #7c3aed, #ff3366);
  border: none;
  color: white;
  font-weight: 600;
  margin-top: 15px;
  font-size: 16px;
}

.btn:active {
  transform: scale(0.96);
}

.token {
  font-size: 40px;
  text-align: center;
  letter-spacing: 8px;
  margin: 20px 0;
  text-shadow: 0 0 20px rgba(124,58,237,0.8);
}

.card {
  padding: 15px;
  border-radius: 15px;
  background: var(--card);
  margin-top: 10px;
}

.success {
  text-align: center;
  margin-top: 100px;
  animation: fade 0.4s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>RollCallX</h1>
<p class="subtitle">Smart Attendance System</p>

<!-- STUDENT CHECK-IN -->
<div class="glass">
  <h3>Student Check-In</h3>
  <input id="tokenInput" placeholder="ENTER TOKEN">
  <button class="btn" onclick="checkIn()">Check In</button>
</div>

<!-- LECTURER -->
<div class="glass">
  <h3>Lecturer Panel</h3>
  <button class="btn" onclick="startSession()">Start Session</button>

  <div class="token" id="tokenDisplay">------</div>

  <div class="card">Present: <span id="count">0</span></div>
</div>

</div>

<script>
// TEMP DATA (replace with Supabase later)
let currentToken = null;
let attendanceCount = 0;

// START SESSION
function startSession() {
  currentToken = Math.random().toString(36).substring(2,8).toUpperCase();
  document.getElementById("tokenDisplay").innerText = currentToken;
  attendanceCount = 0;
  document.getElementById("count").innerText = attendanceCount;
}

// CHECK-IN
function checkIn() {
  const input = document.getElementById("tokenInput").value.toUpperCase();

  if (!currentToken) {
    alert("No active session");
    return;
  }

  if (input === currentToken) {
    attendanceCount++;
    document.getElementById("count").innerText = attendanceCount;

    document.body.innerHTML = `
      <div class="success">
        <h1>✅</h1>
        <h2>You're marked present</h2>
      </div>
    `;
  } else {
    alert("Invalid token");
  }
}
</script>

</body>
</html>
