<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartCheck Attendance</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen justify-between p-4 relative">
    
    <div class="glow-bg bg-blue-600 w-64 h-64 top-10 left-10 rounded-full"></div>
    <div class="glow-bg bg-purple-600 w-64 h-64 bottom-10 right-10 rounded-full"></div>

    <header class="z-10 w-full max-w-md mx-auto text-center py-4">
        <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">SmartCheck</h1>
        <p class="text-xs text-gray-400 mt-1">Student Attendance Portal</p>
    </header>

    <main class="z-10 w-full max-w-md mx-auto flex-grow flex items-center justify-center">
        
        <div id="regView" class="glass w-full rounded-3xl p-6 hidden space-y-4 shadow-2xl transition-all duration-300">
            <h2 class="text-xl font-semibold text-white mb-2">One-Time Registration</h2>
            <div>
                <label class="text-xs text-gray-400 block mb-1 font-medium">Full Name</label>
                <input type="text" id="regName" class="w-full bg-gray-900/50 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="John Doe">
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1 font-medium">Student ID</label>
                <input type="text" id="regId" class="w-full bg-gray-900/50 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="STU10294">
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1 font-medium">Course / Level</label>
                <input type="text" id="regCourse" class="w-full bg-gray-900/50 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="Computer Science 101">
            </div>
            <button onclick="saveRegistration()" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold rounded-xl py-3 mt-4 transition active:scale-95 shadow-lg">
                Complete Setup
            </button>
        </div>

        <div id="attendanceView" class="glass w-full rounded-3xl p-6 hidden space-y-6 shadow-2xl text-center">
            <div>
                <p class="text-sm text-gray-400">Welcome back,</p>
                <h2 id="studentGreeting" class="text-xl font-bold text-white">Student</h2>
            </div>

            <div class="space-y-2">
                <label class="text-xs text-gray-400 block font-medium">Enter Active Class Passcode</label>
                <input type="text" id="passcode" maxlength="4" class="w-40 text-center tracking-widest text-3xl font-bold bg-gray-900/60 border-2 border-gray-700 rounded-2xl px-3 py-3 text-white focus:outline-none focus:border-blue-500 transition-all" placeholder="0000">
            </div>

            <button onclick="submitAttendance()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl py-3 transition active:scale-95 shadow-md flex items-center justify-center space-x-2">
                <span>Mark Me Present</span>
            </button>

            <div id="statusMsg" class="text-sm font-medium rounded-xl p-3 hidden transition-all"></div>
            
            <button onclick="clearProfile()" class="text-xs text-gray-500 hover:text-gray-400 underline pt-4 block mx-auto">Reset Profile Identity</button>
        </div>
    </main>

    <footer class="z-10 text-center py-4 text-xs text-gray-600">
        &copy; 2026 SmartCheck System. Full-screen Mobile Optimized.
    </footer>

    <script>
        // Supabase Initialization using injection parameters
        const SUPABASE_URL = "https://ntxuezuxnbbrtoenimyk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50eHVlenV4bmJicnRvZW5pbXlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTEyMzIsImV4cCI6MjA5NTM4NzIzMn0.3unzuoVz0Mk6Ocy6cd66O5yefMwbz8KcT-kPxS3SCZA";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener("DOMContentLoaded", () => {
            initApp();
            // Handle PWA Setup
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW error", err));
            }
        });

        function initApp() {
            const studentData = localStorage.getItem("student_profile");
            const urlParams = new URLSearchParams(window.location.search);
            const tokenParam = urlParams.get('token');

            if (!studentData) {
                document.getElementById("regView").classList.remove("hidden");
                document.getElementById("attendanceView").classList.add("hidden");
            } else {
                document.getElementById("regView").classList.add("hidden");
                const profile = JSON.parse(studentData);
                document.getElementById("studentGreeting").innerText = profile.name;
                document.getElementById("attendanceView").classList.remove("hidden");

                if (tokenParam) {
                    const passField = document.getElementById("passcode");
                    passField.value = tokenParam;
                    // Trigger highlighting action state
                    passField.classList.remove("border-gray-700");
                    passField.classList.add("border-green-400", "bg-green-950/20");
                    document.getElementById("submitBtn").classList.replace("bg-blue-600", "bg-gradient-to-r");
                    document.getElementById("submitBtn").classList.add("from-green-500", "to-emerald-600 animate-pulse");
                }
            }
        }

        async function saveRegistration() {
            const name = document.getElementById("regName").value.trim();
            const student_id = document.getElementById("regId").value.trim();
            const course = document.getElementById("regCourse").value.trim();

            if (!name || !student_id || !course) {
                alert("Please fill all configuration metrics.");
                return;
            }

            const profile = { name, student_id, course };
            
            // Check-In/Register inside centralized remote cloud table record
            const { error } = await supabase.from('students').upsert([profile], { onConflict: 'student_id' });
            if (error) {
                alert("Database Sync Error: " + error.message);
                return;
            }

            localStorage.setItem("student_profile", JSON.stringify(profile));
            initApp();
        }

        async function submitAttendance() {
            const statusBox = document.getElementById("statusMsg");
            statusBox.className = "text-sm font-medium rounded-xl p-3 hidden"; 
            
            const enteredToken = document.getElementById("passcode").value.trim();
            const profile = JSON.parse(localStorage.getItem("student_profile"));

            if (!enteredToken) {
                showStatus("Please supply a token entry.", false);
                return;
            }

            try {
                // Fetch valid open state parameter from session validation engine
                const { data: session, error: sErr } = await supabase.from('session').select('*').eq('id', 1).single();
                
                if (sErr || !session || !session.is_open) {
                    showStatus("❌ No active attendance registration running.", false);
                    return;
                }

                // Verify expiration time
                if (new Date() > new Date(session.expires_at)) {
                    showStatus("❌ Invalid or expired code", false);
                    return;
                }

                if (session.active_token !== enteredToken) {
                    showStatus("❌ Invalid code verification failure.", false);
                    return;
                }

                // Attempt record capture with native multi-mutation prevention built into SQL constraints
                const { error: aErr } = await supabase.from('attendance').insert([
                    {
                        student_id: profile.student_id,
                        name: profile.name,
                        status: 'Present'
                    }
                ]);

                if (aErr) {
                    if (aErr.code === '23505') { // Postgres code for duplicate unique mapping block
                        showStatus("⚠️ Attendance already verified for today.", true);
                    } else {
                        showStatus("❌ Transaction Failure: " + aErr.message, false);
                    }
                } else {
                    showStatus("✅ Attendance marked successfully!", true);
                }

            } catch (err) {
                showStatus("Network execution failure context.", false);
            }
        }

        function showStatus(msg, isSuccess) {
            const statusBox = document.getElementById("statusMsg");
            statusBox.classList.remove("hidden");
            statusBox.innerText = msg;
            if (isSuccess) {
                statusBox.classList.add("bg-green-500/20", "text-green-400", "border", "border-green-500/30");
            } else {
                statusBox.classList.add("bg-red-500/20", "text-red-400", "border", "border-red-500/30");
            }
        }

        function clearProfile() {
            if(confirm("Reset registered setup context?")) {
                localStorage.clear();
                window.location.search = "";
                initApp();
            }
        }
    </script>
</body>
</html>
